<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" width="280" height="120">
  <defs>
    <linearGradient id="front" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="back" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="40" y="20" width="200" height="80" rx="14" fill="url(#back)" transform="matrix(0.92 0.18 -0.18 0.92 25 0)" filter="url(#glow)"/>
  <rect x="40" y="20" width="200" height="80" rx="14" fill="url(#front)" transform="matrix(0.92 -0.18 0.18 0.92 -8 12)" filter="url(#glow)"/>
</svg>
