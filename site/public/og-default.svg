<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="front" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="back" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="text" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#f0abfc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="36%" r="55%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="220" rx="520" ry="280" fill="url(#glow)"/>

  <g transform="translate(420 100)">
    <rect x="-80" y="-30" width="380" height="220" rx="18" fill="url(#back)" transform="matrix(0.92 0.18 -0.18 0.92 90 0)" filter="url(#blur)" opacity="0.9"/>
    <rect x="-80" y="-30" width="380" height="220" rx="18" fill="url(#back)" transform="matrix(0.92 0.18 -0.18 0.92 90 0)"/>
    <rect x="0" y="0" width="380" height="220" rx="18" fill="url(#front)" transform="matrix(0.92 -0.18 0.18 0.92 -34 36)"/>
  </g>

  <text
    x="600"
    y="440"
    text-anchor="middle"
    font-family="Inter, -apple-system, sans-serif"
    font-size="64"
    font-weight="800"
    fill="white"
    letter-spacing="-2"
  >@gfazioli/react-flip</text>

  <text
    x="600"
    y="500"
    text-anchor="middle"
    font-family="Inter, -apple-system, sans-serif"
    font-size="26"
    font-weight="500"
    fill="#a1a1aa"
    letter-spacing="-0.5"
  >Two faces · 3D rotation · Themeable via CSS variables · Zero deps</text>

  <text
    x="600"
    y="565"
    text-anchor="middle"
    font-family="JetBrains Mono, ui-monospace, monospace"
    font-size="22"
    font-weight="600"
    fill="url(#text)"
    letter-spacing="2"
  >v1 · React 18 &amp; 19</text>
</svg>
